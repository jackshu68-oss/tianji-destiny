<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>紫微斗数十二宫｜道法自然</title><meta name="description" content="以紫微十二宫、主星与四化观察性格、事业、财富及关系主题，并与八字阶段分开呈现。"><link rel="canonical" href="https://tianji.47-86-31-98.sslip.io/ziwei/"><link rel="icon" href="../assets/daofa-mark.svg" type="image/svg+xml"><link rel="stylesheet" href="../css/style.css?v=20260718-12"></head><body><nav class="nav"><div class="nav-inner"><a class="brand brand-link" href="../">道法自然<span class="brand-en">DAOFA</span></a><a class="policy-back" href="../guide/">使用指南</a></div></nav><main class="guide-main"><header class="guide-hero"><p class="eyebrow">紫微斗数</p><h1>十二宫展开，不用一颗星替你下结论</h1><p>紫微盘以出生时辰定位十二宫，再结合主星、辅星与四化。网站会把紫微作为独立依据层，并与八字本命及大运分别标示。</p><a class="btn-primary" href="../#compute">输入准确时辰排盘</a></header><section class="guide-section"><h2>准确度边界</h2><div><p>紫微十二宫依赖出生时辰。不知道时辰时，系统不会使用中午、随机时辰或默认值补盘。</p><p>只有“大约”时辰时，应同时比较候选时辰，并优先寻找出生证明或家庭记录。</p></div></section><section class="guide-section"><h2>阅读顺序</h2><div><ul><li>先看命宫与身宫的核心主题</li><li>再看官禄、财帛、夫妻与福德等问题宫位</li><li>最后结合四化、大运与现实阶段，不作单星断语</li></ul></div></section></main></body></html>
