<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>每日个人节奏｜道法自然</title><meta name="description" content="以行动、沟通、财务、关系与状态五个维度整理每日个人节奏，并提供最适合、要避免及今日提醒。"><link rel="canonical" href="https://daofainsight.com/daily/"><link rel="icon" href="../assets/daofa-mark.svg" type="image/svg+xml"><link rel="stylesheet" href="../css/style.css?v=20260718-12"></head><body><nav class="nav"><div class="nav-inner"><a class="brand brand-link" href="../">道法自然<span class="brand-en">DAOFA</span></a><a class="policy-back" href="../guide/">使用指南</a></div></nav><main class="guide-main"><header class="guide-hero"><p class="eyebrow">个人节奏</p><h1>每天只看三件事，再按五个维度展开</h1><p>生成命盘后，日历会结合本命日主与当日干支，整理最适合、要避免与一项现实提醒；传统黄历宜忌保留为次要参考。</p><a class="btn-primary" href="../#compute">建立我的节奏日历</a></header><section class="guide-section"><h2>五个维度</h2><div><ul><li>行动：适合推进还是先观察</li><li>沟通：表达、谈判与合作节奏</li><li>财务：消费和决策谨慎度</li><li>关系：互动敏感度与边界</li><li>状态：精力与情绪节奏</li></ul></div></section><section class="guide-section"><h2>日历导出</h2><div><p>可加入自订事项，并把当月较协调的日期与事项导出为标准 ICS 文件，导入 Apple Calendar 或 Google Calendar。</p></div></section></main></body></html>
